<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - LRB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --primary-color: #333;
            --accent-color: #000;
            --text-light: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }

        #banners-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .promo-banner {
            position: relative;
            height: 400px; /* Ajustado a tus dimensiones de 1400x400 escala */
            border-radius: 12px;
            overflow: hidden;
            display: none; /* Se activa vía JS */
            align-items: center;
            justify-content: center;
            background-color: #eee;
        }

        .promo-banner-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .promo-banner:hover .promo-banner-img {
            transform: scale(1.05);
        }

        .promo-banner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.6));
            z-index: 1;
        }

        .promo-banner-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: var(--text-light);
            padding: 20px;
        }

        .promo-banner-label {
            background: var(--text-light);
            color: var(--accent-color);
            display: inline-block;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .promo-banner-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .promo-banner-cta {
            font-weight: 400;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        @media (max-width: 768px) {
            #banners-container {
                grid-template-columns: 1fr;
            }
            .promo-banner {
                height: 300px;
            }
        }
    </style>
</head>
<body>

    <section id="banners-container">
        <div id="banner-1" class="promo-banner"></div>
        <div id="banner-2" class="promo-banner"></div>
    </section>

    <section id="productos" style="height: 1000px; padding: 50px; text-align: center;">
        <h2>Nuestros Productos</h2>
        <p>Aquí se filtrarán los productos al hacer clic en los banners.</p>
    </section>

    <script>
        // Esta función procesa el renderizado de cada banner individualmente
        function renderBanners(bannerData) {
            const banner1El = document.getElementById('banner-1');
            const banner2El = document.getElementById('banner-2');
            
            if (!banner1El || !banner2El) return;
            
            const renderBanner = (el, data) => {
                // Validación: Si no hay datos o el título está vacío, ocultamos el elemento
                if (!data || !data.title || data.title.trim() === "") {
                    el.style.display = 'none';
                    return;
                }
                
                el.style.display = 'flex';
                el.style.cursor = 'pointer';
                const cat = data.cat || 'all';
                const imgSrc = data.img ? data.img.trim() : null;
                
                el.innerHTML = `
                    ${imgSrc ? `<img class="promo-banner-img" src="${imgSrc}" alt="${data.title}" loading="lazy"/>` : ''}
                    <div class="promo-banner-overlay"></div>
                    <div class="promo-banner-content">
                        ${data.label ? `<div class="promo-banner-label">${data.label}</div>` : ''}
                        <div class="promo-banner-title">${data.title}</div>
                        <div class="promo-banner-cta">Ver productos <i class="bi bi-arrow-right"></i></div>
                    </div>
                `;
                
                el.onclick = () => {
                    console.log("Filtrando por categoría:", cat);
                    
                    // Lógica de filtrado (asegúrate de tener definida filterCat)
                    if (typeof filterCat === "function") {
                        if (cat !== 'all') {
                            const btn = document.querySelector(`[data-cat="${cat}"]`);
                            if (btn) filterCat(btn, cat);
                        } else {
                            const btnAll = document.querySelector('[data-cat="all"]');
                            if (btnAll) filterCat(btnAll, 'all');
                        }
                    }

                    // Scroll suave hacia los productos
                    window.scrollTo({ 
                        top: document.getElementById('banners-container').offsetTop + 400, 
                        behavior: 'smooth' 
                    });
                };
            };
            
            // Ejecutamos para ambos banners
            renderBanner(banner1El, bannerData.banner1);
            renderBanner(banner2El, bannerData.banner2);
        }

        // --- EJEMPLO DE USO ---
        // Aquí simulo el objeto que vendría de tu Google Sheets
        const datosDePrueba = {
            banner1: {
                title: "Colección Invierno",
                label: "Nuevo",
                img: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&w=1400&q=80",
                cat: "invierno"
            },
            banner2: {
                title: "Jeans Bordados",
                label: "30% OFF",
                img: "https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=1400&q=80",
                cat: "pantalones"
            }
        };

        // Llamamos a la función con los datos
        renderBanners(datosDePrueba);

        // Función dummy para que no de error el onclick en el ejemplo
        function filterCat(btn, cat) {
            alert("Se filtraría la categoría: " + cat);
        }
    </script>
</body>
</html>
