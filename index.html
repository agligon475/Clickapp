<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dale! Te Pido - Micrositio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/vaibhav111tandon/vov.css@latest/vov.css" rel="stylesheet" type="text/css">
    <style>
        :root {
            --brand-blue: #00558D; /* Azul aproximado de la imagen */
            --bg-color: #f0f4f8;
            --dtp-white: #fafafa;
            --dtp-black: #010101;
            --dtp-brand-light: #3377a4;
            --dtp-brand-dark:#00406a;
        }
        h1{font-size:56px;margin:0 1rem;padding-bottom: 4rem;}

        body {
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
        }

        .wrapper-home{
          display:flex;
          flex-direction: column;
          align-items: center;
}

        .container {
            text-align: center;
            background: #00558D;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            max-width: 450px;
            width: 90%;
        }

        .logo-img {
            max-width: 100%;
            height: auto;
            margin-bottom: 2rem;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .btn {
            padding: 14px 28px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        /* Estilo para /tienda.html */
        .btn-tienda {
            background-color: var(--dtp-white);
            color: var(--brand-blue);
            
        }

        /* Estilo para /dashboard.html */
        .btn-dashboard {
            background-color: transparent;
            color: var(--dtp-white);
            border: 2px solid var(--dtp-white);
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 82, 137, 0.2);
        }

        .btn-tienda:hover {
            background-color: var(--dtp-brand-light);
            color:var(--dtp-white);
            border: 2px solid var(--dtp-white);

        }

        .btn-dashboard:hover {
            background-color: var(--dtp-brand-dark);
            
        }
    </style>
</head>
<body>
    <div class="wrapper-home vov fade-in-down slow">
<h3>Estar presente ya no esta en duda</h3>
<h1>Los limites no existen</h1>
    <div class="container vov fade-in-up">
        <img src="https://res.cloudinary.com/deuog0r34/image/upload/v1778811606/daletepido-logo-white_zpcolq.png" alt="Dale! Te Pido" class="logo-img">
        
        <div class="button-group">
            <a href="/tienda.html" class="btn btn-tienda">Ir a la Tienda</a>
            <a href="/dashboard.html" class="btn btn-dashboard">Mi Dashboard</a>
        </div>
    </div>
  </div>

</body>
</html>
