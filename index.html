<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dale! Te Pido</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="vov.min.css">
    <style>
        :root {
            --brand-blue: #00558D; 
            --bg-color: #f0f4f8;
            --dtp-white: #fafafa;
            --dtp-black: #010101;
            --dtp-brand-light: #3377a4;
            --dtp-brand-dark: #00406a;
            --text-muted: #52758e;
        }

        body {            
            font-family: 'Poppins', sans-serif;            
            display: flex;            
            justify-content: center;            
            align-items: center;            
            min-height: 100vh;            
            margin: 0;            
            background-color: var(--bg-color);
            color: var(--dtp-black);
        }

        .wrapper-home {          
            display: flex;          
            flex-direction: column;          
            align-items: center;
            width: 100%;
            padding: 2rem 0;
        }

        /* Encabezado Estilizado */
        .hero-header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
        }

        .hero-header h3 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin: 0 0 0.5rem 0;
            font-weight: 600;
        }

        .hero-header h1 {
            font-size: 2.5rem; /* Más balanceado para mobile y desktop */
            font-weight: 700;
            line-height: 1.2;
            color: var(--dtp-brand-dark);
            margin: 0;
        }

        /* Contenedor Principal */
        .container {            
            text-align: center;            
            background: var(--brand-blue);            
            padding: 3rem 2.5rem;            
            border-radius: 24px;            
            box-shadow: 0 20px 40px rgba(0, 85, 141, 0.15);            
            max-width: 420px;            
            width: 85%;        
        }

        .logo-img {            
            max-width: 85%;            
            height: auto;            
            margin-bottom: 2.5rem;        
        }

        .button-group {            
            display: flex;            
            flex-direction: column;            
            gap: 1rem;        
        }

        /* Botones Base */
        .btn {            
            padding: 16px 28px;            
            text-decoration: none;            
            border-radius: 14px;            
            font-weight: 600;            
            font-size: 1.05rem;            
            transition: all 0.25s ease-in-out;
            box-sizing: border-box;
            display: block;
        }

        /* Botón Tienda (Principal) */
        .btn-tienda {            
            background-color: var(--dtp-white);            
            color: var(--brand-blue);          
            border: 2px solid var(--dtp-white);  
        }

        .btn-tienda:hover {            
            background-color: transparent;            
            color: var(--dtp-white);            
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* Botón Dashboard (Secundario) */
        .btn-dashboard {            
            background-color: transparent;            
            color: var(--dtp-white);            
            border: 2px solid rgba(250, 250, 250, 0.4); 
        }

        .btn-dashboard:hover {            
            background-color: var(--dtp-brand-dark);     
            border-color: var(--dtp-brand-dark);               
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* Footer sutil de la app */
        .app-footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* Ajuste para pantallas medianas/grandes */
        @media (min-width: 768px) {
            .hero-header h1 {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="vov fade-in-down slow wrapper-home">
        
        <header class="hero-header">
            <h3>Estar presente ya no está en duda</h3>
            <h1>LOS LÍMITES NO EXISTEN</h1>
        </header>

        <div class="vov fade-in-up container">
            <img src="https://res.cloudinary.com/deuog0r34/image/upload/v1778811606/daletepido-logo-white_zpcolq.png" alt="Dale! Te Pido" class="logo-img">
                    
            <div class="button-group">
                <a href="/tienda.html" class="btn btn-tienda">Ir a la Tienda</a>
                <a href="/dashboard.html" class="btn btn-dashboard">Mi Dashboard</a>
            </div>
        </div>

        <footer class="app-footer">
            <p>© 2026 Dale! Te Pido</p>
        </footer>
        
    </div>

</body>
</html>
